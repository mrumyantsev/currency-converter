version: '3.8'

services:
  web:
    container_name: cc-web
    hostname: cc-web
    restart: unless-stopped
    image: nginx:${NGINX_VER}-alpine${ALPINE_VER}
    volumes:
      - ${WEB_LOCAL_DIR}:/usr/share/nginx/html
    networks:
      - cc-external-network
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - server

  server:
    container_name: cc-server
    hostname: cc-server
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - GO_VER=${GO_VER}
        - ALPINE_VER=${ALPINE_VER}
        - APP_NAME=${SERVER_APP_NAME}
    env_file:
      - ./.env
    environment:
      - DB_HOSTNAME=cc-db
    networks:
      - cc-internal-network
      - cc-external-network
    ports:
      - "${HTTP_SERVER_LISTEN_PORT}:${HTTP_SERVER_LISTEN_PORT}"
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: cc-db
    hostname: cc-db
    restart: unless-stopped
    image: postgres:${POSTGRES_VER}-alpine${ALPINE_VER}
    environment:
      - PGDATA=/data
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    volumes:
      - ${DB_LOCAL_DIR}:/data
    networks:
      - cc-internal-network
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  cc-internal-network:
    name: cc-internal-network
    driver: bridge
    internal: true

  cc-external-network:
    name: cc-external-network
    driver: bridge
    internal: false
